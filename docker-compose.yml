version: '3.9'
services:
  db:
    image: postgres:15-alpine
    container_name: rently-db
    environment:
      POSTGRES_USER: rently
      POSTGRES_PASSWORD: rently
      POSTGRES_DB: rently
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rently-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
