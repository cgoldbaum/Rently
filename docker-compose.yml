version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: rently-db
    environment:
      POSTGRES_USER: rently
      POSTGRES_PASSWORD: rently
      POSTGRES_DB: rently
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
